name: Build & Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Extract changelog
        id: changelog
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          # Extrait la section du changelog pour cette version jusqu'à la prochaine version ou fin du fichier
          CHANGELOG=$(sed -n "/## \[$VERSION\]/,/## \[/p" CHANGELOG.md | sed '$d' | tail -n +2)
          # Escape pour les passer en output
          CHANGELOG="${CHANGELOG//'%'/'%25'}"
          CHANGELOG="${CHANGELOG//$'\n'/'%0A'}"
          CHANGELOG="${CHANGELOG//$'\r'/'%0D'}"
          echo "body=$CHANGELOG" >> $GITHUB_OUTPUT

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer

      - name: Install Composer dependencies (no dev)
        run: composer install --no-dev --optimize-autoloader

      - name: Build zip
        run: |
          mkdir -p dist/fftt-match-block
          rsync -r \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='dist' \
            --exclude='.gitignore' \
            ./ dist/fftt-match-block/
          cd dist
          zip -r fftt-match-block.zip fftt-match-block/

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: dist/fftt-match-block.zip
          body: ${{ steps.changelog.outputs.body }}
